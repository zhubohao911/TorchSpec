# DFlash training config for Qwen3-8B target model
#
# Phase H: Convergence-optimized config for 800K PerfectBlend
#
# Key changes from Phase G (190K × 3ep, τ=3.06):
#   - accum 4→2: 2x more optimizer steps for better convergence
#   - weight_decay 0→0.01: AdamW regularization for generalization
#   - min_lr 0→6e-5: prevent LR death in later epochs (10% of peak)
#   - dataset: 800K PerfectBlend (set via CLI --dataset-size 800000)
#
# GPU allocation (8x H100, 512-E config — fastest wall-clock):
#   - 4 GPUs for inference (SGLang engine, tp_size=1)
#   - 4 GPUs for training (FSDP FULL_SHARD)
#   - global_batch = 1 × 2 × 4 = 8
#   - ~760K effective samples × 3 epochs / 8 = ~285K optimizer steps
#
# Usage:
#   modal run --detach scripts/modal/modal_dflash_train.py \
#     --num-epochs 3 --dataset-size 800000 \
#     --hf-repo Xingh3/dflash-qwen3-8b-800k-3epoch \
#     --extra-overrides "training.dflash_num_anchors=512 \
#       inference.inference_num_gpus=4 training.training_num_gpus_per_node=4"

model:
  target_model_path: Qwen/Qwen3-8B
  trust_remote_code: true
  draft_model_config: torchspec/config/dflash_draft_config.json

dataset:
  train_data_path: ../examples/data/sample_conversations.jsonl
  eval_data_path: null
  eval_interval: 100
  chat_template: qwen
  prompt_key: conversations
  min_loss_tokens: 32

training:
  attention_backend: flex_attention
  micro_batch_size: 1
  draft_accumulation_steps: 2       # was 4 → 2x more optimizer steps
  learning_rate: 6e-4
  min_lr: 6e-5                      # 10% of peak — prevents LR death in later epochs
  weight_decay: 0.01                # AdamW regularization for better generalization
  max_concurrent_batches: 1
  max_grad_norm: 1.0
  max_seq_length: 2048
  num_epochs: 3
  seed: 42
  training_num_gpus_per_node: 4
  training_num_nodes: 1
  ttt_length: 7
  fsdp_strategy: FULL_SHARD
  fsdp_reduce_dtype: bfloat16
  prefetch_depth: 8
  save_interval: 1000
  save_per_epoch: true
  max_checkpoints: 2
  warmup_ratio: 0.04

  # DFlash-specific parameters
  dflash_block_size: 16
  dflash_num_anchors: 512
  dflash_loss_decay_gamma: 7.0
  dflash_num_target_layers: 5

inference:
  inference_engine_type: sgl
  inference_num_gpus: 4
  inference_num_gpus_per_engine: 1
  inference_num_gpus_per_node: 4
  max_sample_pool_size: 64
  inference_buffer_threshold: 32
  inference_batch_size: 8
  sglang:
    tp_size: 1
    mem_fraction_static: 0.7

mooncake:
  master_server_address: null
  metadata_server: null
  protocol: tcp
  global_segment_size: 16GB
  local_buffer_size: 4GB

output_dir: ./outputs/qwen3-8b-dflash
cache_dir: ./cache/qwen3-8b-dflash
model_download_dir: null

debug:
  save_debug_train_data: null
  debug_train_only: false
  debug_inference_only: false
