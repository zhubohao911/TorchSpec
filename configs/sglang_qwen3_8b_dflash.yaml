# DFlash training config for Qwen3-8B target model
#
# GPU allocation (optimized — Test 7 configuration):
#   - 1 GPU for inference (SGLang engine, tp_size=1)
#   - 3 GPUs for training (FSDP FULL_SHARD across 3 GPUs)
#   - Total: 4 GPUs
#
# Speed: ~5.3 step/s × 3 samples/step = 15.9 samples/s
# CPU prefetch overlaps Mooncake TCP with GPU compute (data_time ~1-9ms)
#
# Usage:
#   python -m torchspec.train_entry --config configs/sglang_qwen3_8b_dflash.yaml
#
# Phase 3 τ benchmark (checkpoints at 5k, 10k, 15k steps):
#   python -m torchspec.train_entry --config configs/sglang_qwen3_8b_dflash.yaml \
#     dataset.train_data_path=/workspace/data/perfectblend_50k.jsonl \
#     dataset.eval_data_path=null

model:
  target_model_path: Qwen/Qwen3-8B
  trust_remote_code: true
  draft_model_config: torchspec/config/dflash_draft_config.json

dataset:
  train_data_path: ../examples/data/sample_conversations.jsonl
  eval_data_path: null  # Disable eval for production training
  eval_interval: 100
  chat_template: qwen
  prompt_key: conversations
  min_loss_tokens: 32  # 2 * block_size — matches SpecForge filter for valid anchor sampling

training:
  attention_backend: flex_attention
  micro_batch_size: 1
  draft_accumulation_steps: 1
  learning_rate: 6e-4
  max_concurrent_batches: 1
  max_grad_norm: 1.0
  max_seq_length: 4096
  num_epochs: 6
  seed: 42
  training_num_gpus_per_node: 3   # 3 GPUs for training (was 2)
  training_num_nodes: 1
  ttt_length: 7
  fsdp_strategy: FULL_SHARD        # FULL_SHARD halves optimizer memory
  fsdp_reduce_dtype: bfloat16      # bf16 gradient reduction (saves bandwidth)
  prefetch_depth: 2                 # CPU prefetch: overlap Mooncake TCP with GPU compute
  save_interval: 5000              # Checkpoint every 5k steps for τ benchmark
  save_per_epoch: false             # Use save_interval instead
  max_checkpoints: 4               # Keep 5k, 10k, 15k + final
  warmup_ratio: 0.04

  # DFlash-specific parameters
  dflash_block_size: 16
  dflash_num_anchors: 512
  dflash_loss_decay_gamma: 7.0
  dflash_num_target_layers: 5

inference:
  inference_engine_type: sgl
  inference_num_gpus: 1
  inference_num_gpus_per_engine: 1
  inference_num_gpus_per_node: 1
  max_sample_pool_size: 64
  inference_buffer_threshold: 32
  inference_batch_size: 8
  sglang:
    tp_size: 1
    mem_fraction_static: 0.7

mooncake:
  master_server_address: null
  metadata_server: null
  protocol: tcp
  global_segment_size: 16GB
  local_buffer_size: 4GB

output_dir: ./outputs/qwen3-8b-dflash
cache_dir: ./cache/qwen3-8b-dflash
model_download_dir: null

debug:
  save_debug_train_data: null
  debug_train_only: false
  debug_inference_only: false
